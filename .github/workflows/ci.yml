name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: tests (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Compile Python sources
        run: PYTHONPATH=src python -m compileall src tests

      - name: Validate included sample dataset
        run: PYTHONPATH=src python -m polymarket_backtest.sample_validate --snapshots data/mock/snapshots.csv

      - name: Run mock paper backtest
        run: PYTHONPATH=src python -m polymarket_backtest.cli --snapshots data/mock/snapshots.csv --bankroll 100
